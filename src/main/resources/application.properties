# ==============================
# Application
# ==============================
spring.application.name=ShuttleX
server.port=${PORT:8080}

# ==============================
# PostgreSQL Database
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shuttlex_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==============================
# Flyway Database Migration
# ==============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ==============================
# JWT Configuration
# ==============================
# Production ortamında mutlaka güçlü ve rastgele bir secret kullanın (min. 256-bit / 32 karakter)
jwt.secret=${JWT_SECRET:ShuttleXSuperSecretKeyForJWTTokenGeneration2024MustBeAtLeast256BitsLong!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.header=Authorization
jwt.prefix=Bearer

# ==============================
# Internationalization
# ==============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ==============================
# Logging
# ==============================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.shuttlex=DEBUG

# ==============================
# CORS (cloud: APP_CORS_ALLOWED_ORIGINS)
# ==============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==============================
# Multipart / File Upload
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
app.upload.vehicle-images-dir=${APP_UPLOAD_VEHICLE_IMAGES_DIR:uploads/vehicles}
