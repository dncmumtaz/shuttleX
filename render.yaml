# ShuttleX — Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: shuttlex-prod-db
    databaseName: shuttlex_db
    user: shuttle_user
    region: frankfurt
    plan: free

services:
  # ---------------------------------------------------------------------------
  # Backend API (Spring Boot — Docker)
  # Dockerfile repo kökündeki pom.xml ve src/ dosyalarına ihtiyaç duyar;
  # docker-compose ile aynı bağlam: context=., dockerfile=backend/Dockerfile
  # ---------------------------------------------------------------------------
  - type: web
    name: shuttlex-backend
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - src/**
        - backend/**
        - pom.xml
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: shuttlex-prod-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: shuttlex-prod-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: shuttlex-prod-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: shuttlex-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_UPLOAD_VEHICLE_IMAGES_DIR
        value: /app/uploads/vehicles

  # ---------------------------------------------------------------------------
  # Frontend (Vite + React — Static Site CDN)
  # ---------------------------------------------------------------------------
  - type: web
    name: shuttlex-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && VITE_API_BASE_URL="${VITE_API_BASE_URL}/api/v1" npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: shuttlex-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
